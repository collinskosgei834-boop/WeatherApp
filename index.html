<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App | Collins Kosgei</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="weather-card">

            <h1>🌦 Weather App</h1>

            <p class="subtitle">
                Get the current weather for any city in the world.
            </p>

            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name">

          <div class="button-group">

    <button id="searchBtn">
        Get Weather
    </button>

    <button id="locationBtn">
        📍 Use My Location
    </button>

</div>
<div id="message"></div>
           <div id="loading" style="display:none;">

    <p>⏳ Loading weather information...</p>

</div>

<div id="weatherResult">

    <h2>Weather Information</h2>

    <p><strong>City:</strong> <span id="city">--</span></p>

    <p><strong>Temperature:</strong> <span id="temperature">--</span></p>

    <p><strong>Condition:</strong> <span id="condition">🌤️ --</span></p>

    <p><strong>Humidity:</strong> <span id="humidity">--</span></p>

    <p><strong>Wind Speed:</strong> <span id="wind">--</span></p>

</div>
<h2>Recent Searches</h2>

<ul id="recentSearches">

</ul>
    <script src="script.js"></script>

</body>
</html>
